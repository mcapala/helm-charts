{{- with .Values.istiocni }}
{{- if eq (.enabled | toString) "true" }}
---
apiVersion: sailoperator.io/v1
kind: IstioCNI
metadata:
  name: {{ .name }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncwave | default "3" | quote }}
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    {{- if .additionalAnnotations }}
    {{- include "tpl.additionalAnnotations" .additionalAnnotations | nindent 4 }}
    {{- end }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- if .additionalLabels }}
    {{- include "tpl.additionalLabels" .additionalLabels | nindent 4 }}
    {{- end }}
spec:
  namespace: {{ .namespace }}
  {{- if .version }}
  version: {{ .version }}
  {{- end }}
  {{- if .values }}
  values:
    {{- toYaml .values | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
