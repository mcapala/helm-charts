{{- with .Values.monitoring }}
{{- if eq ((.clusterMonitoringView).enabled | toString) "true" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .clusterMonitoringView.name }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncwave | default "3" | quote }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: {{ .clusterMonitoringView.serviceAccount }}
    namespace: {{ $.Values.kiali.namespace }}
{{- end }}
{{- end }}
